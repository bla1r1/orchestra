# ─────────────────────────────────────────────────────────────────────────────
# HOW TO CONFIGURE ROUTING (two knobs, no code):
#
#   1. "What agent for what task"  -> edit a task_type's `chain` below.
#      List agent names in the order you want them tried. The engine appends any
#      other capable + available agent as ultimate fallback, so you only list
#      your preferences. Empty chain = pure priority order.
#
#   2. "Global preference"         -> edit `priority:` in config/agents/<name>.yml
#      Lower number = tried earlier. Used for the fallback tail and for tasks
#      with no explicit chain.
#
#   Preview any change WITHOUT spending quota:
#      orchestra route --task-type refactoring
#      orchestra route --capability coding,review
#
# Cooldowns (quota-exhausted agents) and capability filtering are automatic.
# ─────────────────────────────────────────────────────────────────────────────
default_capability: coding

task_types:
  refactoring:        # large refactors -> Codex
    capabilities: [refactoring, coding]
    chain: [codex, opencode, claude]

  java:               # JVM implementation -> OpenCode
    capabilities: [coding]
    chain: [opencode, codex, claude]

  architecture:       # design alternatives -> Antigravity (replaced Gemini)
    capabilities: [architecture, reasoning]
    chain: [antigravity, claude]

  draft:              # fast first pass -> MiMo
    capabilities: [coding]
    chain: [mimo, codex]

  review:             # quality control of a worker's output -> MiMo
    capabilities: [review]
    chain: [mimo, codex, claude]

  security_review:    # security specifically stays in-house -> Claude
    capabilities: [review]
    chain: [claude]

  bug:                # investigation -> Antigravity
    capabilities: [reasoning, coding]
    chain: [antigravity, codex]

  documentation:      # whoever is up
    capabilities: [documentation]
    chain: []

  planning:           # delegated to a worker (opencode) — orchestrator only reviews
    capabilities: [planning]
    chain: [antigravity, opencode, claude]
