name: codex
# OpenAI Codex CLI, non-interactive exec. VERIFIED on codex-cli 0.137.0.
#  --skip-git-repo-check: exec refuses to run outside a trusted git dir without it.
#  -s workspace-write:    default sandbox is read-only; implementation needs write.
# Auth is the ChatGPT subscription (`codex login status` -> "Logged in using
# ChatGPT"), no API key involved. Add `-C <dir>` (or set cwd:) to target a repo.
command: ["codex", "exec", "--skip-git-repo-check", "-s", "workspace-write", "-m", "{model}", "{prompt}"]
model: gpt-5.6-luna            # default; override with `orchestra run --model ...`
capabilities: [coding, refactoring, testing, review, reasoning, architecture]
priority: 10
timeout: 900
update: ["codex", "update"]
install: ["npm", "install", "-g", "@openai/codex"]
quota_patterns:
  - "rate limit"
  - "quota"
  - "insufficient_quota"
  - "you have hit your usage limit"
  - "429"
retryable_patterns:
  - "timeout"
  - "ECONNRESET"
  - "service unavailable"
